<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TechDaily - {{DATE}}</title>
    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #e2e8f0;
            --text-secondary: #94a3b8;
            --accent: #38bdf8;
            --accent2: #a78bfa;
            --border: #334155;
            --success: #4ade80;
            --warning: #fbbf24;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
            padding: 20px;
        }
        .container { max-width: 900px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 2px solid var(--border);
            margin-bottom: 30px;
        }
        .header h1 {
            font-size: 2.2em;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        .header .meta {
            color: var(--text-secondary);
            font-size: 0.9em;
        }
        .section {
            background: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            border: 1px solid var(--border);
        }
        .section h2 {
            color: var(--accent);
            font-size: 1.4em;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border);
        }
        .section h3 {
            color: var(--accent2);
            font-size: 1.1em;
            margin: 16px 0 8px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
        }
        th, td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }
        th {
            color: var(--accent);
            font-weight: 600;
            background: rgba(56, 189, 248, 0.05);
        }
        a {
            color: var(--accent);
            text-decoration: none;
            transition: opacity 0.2s;
        }
        a:hover { opacity: 0.8; text-decoration: underline; }
        ul { margin: 8px 0; padding-left: 20px; }
        li { margin: 6px 0; }
        code {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent);
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 0.85em;
        }
        blockquote {
            border-left: 3px solid var(--accent2);
            padding-left: 16px;
            margin: 12px 0;
            color: var(--text-secondary);
        }
        .heatmap-bar {
            display: inline-block;
            background: linear-gradient(90deg, var(--accent), var(--accent2));
            height: 8px;
            border-radius: 4px;
            margin-left: 8px;
            vertical-align: middle;
        }
        .repo-item {
            background: rgba(56, 189, 248, 0.05);
            border-radius: 8px;
            padding: 12px;
            margin: 8px 0;
            border-left: 3px solid var(--accent);
        }
        .repo-name { font-weight: 600; font-size: 1.05em; }
        .repo-meta { color: var(--text-secondary); font-size: 0.85em; margin-top: 4px; }
        .repo-desc { color: var(--text-secondary); margin-top: 6px; font-size: 0.9em; }
        .footer {
            text-align: center;
            padding: 30px;
            color: var(--text-secondary);
            font-size: 0.85em;
            border-top: 1px solid var(--border);
            margin-top: 30px;
        }
        @media (max-width: 600px) {
            body { padding: 10px; }
            .header h1 { font-size: 1.6em; }
            .section { padding: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>TechDaily</h1>
            <div class="meta">{{DATE}} | {{GENERATED_AT}}</div>
        </div>
        {{CONTENT}}
        <div class="footer">
            <p>TechDaily - Auto-generated Tech News Daily</p>
            <p>Generated: {{GENERATED_AT}}</p>
        </div>
    </div>
</body>
</html>
